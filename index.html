<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Recs</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="phone-shell">

    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar__left">
        <span class="top-bar__label">Discover</span>
        <h1 class="top-bar__title">Movie<br>Recs</h1>
      </div>
    </header>

    <!-- Form -->
    <main class="form-scroll" id="formView">
      <form class="rec-form" id="recForm" novalidate>

        <div class="question-card">
          <span class="question-card__index">01</span>
          <label class="question-card__label" for="q1">
            What's your all-time favourite film and why?
          </label>
          <textarea
            id="q1"
            name="favourite"
            class="question-card__input"
            placeholder="e.g. The Shawshank Redemption — it taught me to never lose hope"
            rows="3"
          ></textarea>
        </div>

        <div class="question-card">
          <span class="question-card__index">02</span>
          <label class="question-card__label" for="q2">
            New release or a timeless classic?
          </label>
          <div class="chip-group" role="group" aria-labelledby="q2-label">
            <button type="button" class="chip" data-group="era" data-value="new">New Release</button>
            <button type="button" class="chip" data-group="era" data-value="classic">Classic</button>
            <button type="button" class="chip" data-group="era" data-value="new or classic">Either</button>
          </div>
        </div>

        <div class="question-card">
          <span class="question-card__index">03</span>
          <label class="question-card__label" for="q3">
            Light &amp; fun, or deep &amp; serious?
          </label>
          <div class="chip-group" role="group" aria-labelledby="q3-label">
            <button type="button" class="chip" data-group="mood" data-value="fun">Fun &amp; Silly</button>
            <button type="button" class="chip" data-group="mood" data-value="serious">Serious</button>
            <button type="button" class="chip" data-group="mood" data-value="between fun and serious">Inbetween</button>
          </div>
        </div>

        <button type="submit" class="cta-btn">Find My Movies</button>

      </form>
    </main>

    <!-- Results View (hidden until submit) -->
    <section class="results-view" id="resultsView" hidden>
      <div class="results-header">
        <button class="results-back" id="backBtn" aria-label="Back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <h2 class="results-header__title">Your Picks</h2>
        <p id="resultsText"></p>
      </div>
    </section>

  <script type="module" src="script.js"></script>
</body>
</html>
